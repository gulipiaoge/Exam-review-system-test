# Cloudflare Pages 配置文件
# 用于绑定 D1 数据库

name = "exam-review-system"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[pages_d1_databases]]
binding = "DB"
database_name = "exam-review-db"
database_id = "exam-review-db"

# 构建配置
pages_build_output_dir = "./dist"

# 环境变量（如果需要）
[vars]
ENVIRONMENT = "production"

# Cloudflare Pages 配置文件
# 用于绑定 D1 数据库

name = "exam-review-system"
compatibility_date = "2024-01-01"

# Pages 构建输出目录
pages_build_output_dir = "./dist"

# D1 数据库绑定（正确格式）
[[d1_databases]]
binding = "DB"
database_name = "exam-review-system-db"
database_id = "5e0b6781-ecc2-49e4-9819-5a1b0df1fd21"

# 环境变量
[vars]
ENVIRONMENT = "production"
